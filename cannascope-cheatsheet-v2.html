// ── CARD RENDERING ────────────────────────────────────────────────────────────
function renderCard(p, idx, backupLabel) {
    const isTop   = idx === 0;
    const thc     = parseFloat(p.thc) || 0;
    const cbd     = parseFloat(p.cbd) || 0;
    const cat     = (p.category || 'flower').toLowerCase();
    const fmtLbl  = formatLabel(cat);
    const cbdNote = cbd > 0 ? ` · CBD ${cbd}%` : '';
    const price   = Number(p.price || 0).toFixed(0);
    const goal    = selectedGoal;

    // Rank label
    const rankLabel  = isTop ? 'GIVE THEM THIS' : (backupLabel || 'ALSO WORKS');
    const fromQR     = window._qrActiveProductId && window._qrActiveProductId === p.id;
    const qrBadge    = fromQR ? '<span class="qr-badge">From QR</span>' : '';

    // Manager dot (amber dot if manager_note exists)
    const mgrDot = p.manager_note
        ? `<span class="mgr-dot" title="${xe(p.manager_note)}"></span>`
        : '';

    // Pitch line
    const pitchLine = generatePitch(p, goal);

    // Opening line for Say This
    const openingLine = generateOpeningLine(p, goal);

    // Parse talking points
    const parsed = parseTalkingPoints(p.talking_points);

    // Say This content — bullets
    // Logic: use stored talking points ONLY if they're structured and non-boilerplate.
    // Otherwise fall back to live generation from real product data.
    let bulletHtml = '';
    let usedLiveGeneration = false;

    if (parsed?.tp && !isBoilerplate(parsed.tp)) {
        // Structured talking points, clean — use them
        const cleanBullets = parsed.tp.split('\n')
            .map(l => l.trim().replace(/^[•\-]\s*/, ''))
            .filter(l => l && !isBoilerplate(l));
        if (cleanBullets.length >= 2) {
            bulletHtml = cleanBullets
                .map(l => `<div class="say-this-bullet">${xe(l)}</div>`)
                .join('');
        }
    }

    if (!bulletHtml && parsed?.raw && !isBoilerplate(parsed.raw)) {
        // Old-format plain text — sentence-split it
        const sentences = parsed.raw.split(/\.\s+/)
            .map(s => s.trim())
            .filter(s => s.length > 25 && !isBoilerplate(s));
        if (sentences.length >= 2) {
            bulletHtml = sentences.slice(0, 3)
                .map(s => `<div class="say-this-bullet">${xe(s.endsWith('.') ? s : s + '.')}</div>`)
                .join('');
        }
    }

    if (!bulletHtml) {
        // Fall back to live generation — always product-specific, always honest
        usedLiveGeneration = true;
        const liveBullets = generateLiveTalkingPoints(p, goal);
        bulletHtml = liveBullets
            .map(b => `<div class="say-this-bullet">${xe(b)}</div>`)
            .join('');
    }

    if (!bulletHtml) bulletHtml = `<div class="say-this-bullet">${xe(pitchLine)}</div>`;

    // Next question — format-specific, not generic per-goal
    const nextQ = getNextQuestion(p, goal);

    // Upsell line — format × goal specific
    const upsellLine = generateUpsellLine(p, goal);

    // Details content
    const mechanism = (parsed?.why && !isBoilerplate(parsed.why)) ? parsed.why : '';
    const sig       = livePotencySignal(thc, cbd, cat);
    const upsell    = (parsed?.upsell && !isBoilerplate(parsed.upsell)) ? parsed.upsell : '';
    const mgrNote   = p.manager_note || '';

    let detailsHtml = '';
    if (mechanism) {
        detailsHtml += `<div class="detail-block">
            <div class="detail-label">Why it works</div>
            <div class="detail-text">${xe(mechanism)}</div>
        </div>`;
    }
    if (sig) {
        detailsHtml += `<div class="detail-block">
            <div class="detail-label">Potency</div>
            <div class="detail-text ${sig.cls}">${xe(sig.text)}</div>
        </div>`;
    }
    if (upsell) {
        detailsHtml += `<div class="detail-block">
            <div class="detail-label">Pair with</div>
            <div class="detail-text">${xe(upsell)}</div>
        </div>`;
    }
    if (mgrNote) {
        detailsHtml += `<div class="detail-block">
            <div class="detail-label detail-label-mgr">Store priority</div>
            <div class="detail-mgr-text">${xe(mgrNote)}</div>
        </div>`;
    }

    // Debug section (console only, not rendered in DOM)
    // (kept in JS for window.__runTests compatibility)

    const collapsedClass = isTop ? '' : ' collapsed';
    const expandAttr     = isTop ? '' : ` onclick="expandCard('${xe(p.id)}')"`;

    // Compact meta string for inside the drawer
    const metaStrip = [
        fmtLbl,
        thc > 0 ? `THC ${thc}%` : null,
        cbd > 0.5 ? `CBD ${cbd}%` : null,
        price > 0 ? `$${price}` : null,
        p.shelf ? `Shelf ${p.shelf}` : null,
    ].filter(Boolean).join(' · ');

    // Subtle indicators for rank and QR
    const indicators = [
        fromQR ? '<span class="card-ind qr-ind">QR</span>' : '',
        p.manager_note ? `<span class="card-ind mgr-ind" title="${xe(p.manager_note)}">★</span>` : '',
    ].join('');

    return `
<div class="prod-card${isTop ? ' rank-1' : ''}${collapsedClass}" id="card-${xe(p.id)}"${expandAttr}>
    <div class="card-main">
        <div class="card-top-row">
            <div class="card-name">${xe(p.name)}${indicators}</div>
            ${p.shelf ? `<div class="card-shelf-pill">Shelf ${xe(p.shelf)}</div>` : ''}
        </div>
        ${!isTop ? `<div class="card-expand-hint">Tap to see recommendation</div>` : `<div class="card-pitch">${xe(pitchLine)}</div>`}
        ${isTop ? `
        <div class="card-actions">
            <button class="btn-say-this" onclick="event.stopPropagation(); toggleSayThis('${xe(p.id)}')">Say This</button>
            <button class="rec-btn" id="rec-${xe(p.id)}" onclick="event.stopPropagation(); markSold(this,'${xe(p.id)}',${idx + 1})">Sold</button>
        </div>` : ''}
    </div>
    <div class="say-this-drawer" id="say-${xe(p.id)}">
        <div class="say-this-label">Say this</div>
        ${p.shelf ? `<div class="card-shelf-badge">📍 Shelf ${xe(p.shelf)}</div>` : ''}
        <div class="say-this-opening">${xe(openingLine)}</div>
        <div class="say-this-bullets">${bulletHtml}</div>
        <div class="say-this-upsell">
            <div class="say-this-upsell-label">Upsell</div>
            <div class="say-this-upsell-text">${xe(upsellLine)}</div>
        </div>
        ${nextQ ? `<div class="say-this-next-label">NEXT</div><div class="say-this-next">"${xe(nextQ)}"</div>` : ''}
        <div class="card-meta-strip">${xe(metaStrip)}</div>
        ${!isTop ? `
        <div class="card-actions card-actions-inline">
            <button class="btn-say-this" onclick="event.stopPropagation(); toggleSayThis('${xe(p.id)}')">Close</button>
            <button class="rec-btn" id="rec-${xe(p.id)}" onclick="event.stopPropagation(); markSold(this,'${xe(p.id)}',${idx + 1})">Sold</button>
        </div>` : ''}
        ${detailsHtml ? `<button class="btn-details-link" onclick="toggleDetails('${xe(p.id)}')">Details ↓</button>` : ''}
    </div>
    ${detailsHtml ? `<div class="details-drawer" id="det-${xe(p.id)}">${detailsHtml}</div>` : ''}
</div>`;
}

// ── COMPACT CARD (Also Available) ─────────────────────────────────────────────
function renderCompactCard(p) {
    const thc    = parseFloat(p.thc) || 0;
    const cbd    = parseFloat(p.cbd) || 0;
    const cat    = (p.category || 'flower').toLowerCase();
    const cbdBit = cbd > 0 ? ` · CBD ${cbd}%` : '';
    return `
<div class="prod-card-compact">
    <div>
        <div class="compact-name">${xe(p.name)}</div>
        <div class="compact-meta">${xe(formatLabel(cat))} · THC ${thc > 0 ? thc + '%' : '—'}${xe(cbdBit)} · $${Number(p.price || 0).toFixed(0)}${p.shelf ? ` · Shelf ${xe(p.shelf)}` : ''}</div>
    </div>
    <div class="compact-right">$${Number(p.price || 0).toFixed(0)}</div>
</div>`;
}

// ── DRAWER TOGGLES ────────────────────────────────────────────────────────────
function toggleSayThis(cardId) {
    const drawer = document.getElementById('say-' + cardId);
    const btn    = document.querySelector(`#card-${CSS.escape(cardId)} .btn-say-this`);
    if (!drawer) return;
    const isOpen = drawer.classList.contains('open');
    drawer.classList.toggle('open', !isOpen);
    if (btn) {
        btn.textContent = isOpen ? 'Say This ↓' : '▲ Close';
        btn.classList.toggle('open', !isOpen);
    }
}

function toggleDetails(cardId) {
    const drawer  = document.getElementById('det-' + cardId);
    const sayDraw = document.getElementById('say-' + cardId);
    if (!drawer) return;
    const isOpen = drawer.classList.contains('open');
    drawer.classList.toggle('open', !isOpen);
    // Update the details link inside Say This drawer
    if (sayDraw) {
        const btn = sayDraw.querySelector('.btn-details-link');
        if (btn) btn.textContent = isOpen ? 'Details ↓' : '▲ Less';
    }
}

// ── FIND & RENDER ─────────────────────────────────────────────────────────────
async function findProducts() {
    if (!selectedGoal) return;
    const goal  = selectedGoal;
    const label = GOAL_LABELS[goal];

    document.getElementById('productCards').innerHTML =
        '<div class="loading-state">Scoring inventory…</div>';

    const seed    = getRotationSeed();
    const eligible = allProducts.filter(p => passesHardFilters(p));

    if (eligible.length === 0) {
        // Total empty — show goal bridge
        const adj = ADJACENT_GOALS[goal] || [];
        const bridgeBtns = adj.map(g =>
            `<button class="goal-bridge-btn" onclick="selectGoal('${g}')">${GOAL_LABELS[g]}</button>`
        ).join('');
        document.getElementById('productCards').innerHTML = `
<div class="goal-bridge">
    <div class="goal-bridge-title">No ${label} products match right now.</div>
    <div class="goal-bridge-sub">Try a different goal or remove a filter.</div>
    ${bridgeBtns ? `<div class="goal-bridge-btns">${bridgeBtns}</div>` : ''}
</div>`;
        return;
    }

    // Score all eligible
    const scored = eligible
        .map((p, i) => {
            const result = scoreProduct(p, goal);
            // Apply learned multiplier (goal × format) from nightly aggregation
            const cat = (p.category || 'any').toLowerCase();
            const wt  = (_orgScoreWeights[goal] || {})[cat] || 1.0;
            if (wt !== 1.0) result.score = Math.round(Math.min(100, result.score * wt));
            result.score = Math.min(100, result.score + rotationBonus(i, seed));
            return { ...p, _result: result };
        })
        .sort((a, b) => b._result.score - a._result.score);

    // Normalize display percentages (floor 65%)
    const maxRaw = scored[0]?._result.score || 1;
    scored.forEach(p => {
        p._result.displayPct = maxRaw > 0
            ? Math.max(65, Math.round(65 + (p._result.score / maxRaw) * 35))
            : 65;
    });

    // Top 3 picks with diversity
    const top10    = scored.slice(0, 10);
    const topPicks = pickDiverseTop3(top10);
    const alsoAvail = scored.filter(p => !topPicks.includes(p));

    // Check if recommendations are weak
    const maxScore = scored[0]?._result.score || 0;
    const allWeak  = topPicks.every(p => p._result.confidence === 'LOW') && maxScore < 55;

    let html = '';

    // Thin inventory banner — fewer than 3 matching products
    if (topPicks.length < 3 && !allWeak) {
        html += `<div class="fallback-banner">
            <strong>LIMITED IN STOCK</strong>
            Only ${topPicks.length} ${label} product${topPicks.length !== 1 ? 's' : ''} available right now${filters && Object.keys(filters).length ? ' with these filters' : ''}. Showing best options.
        </div>`;
    }

    // Soft fallback banner (only if genuinely weak)
    if (allWeak) {
        const adj = ADJACENT_GOALS[selectedGoal] || [];
        const bridgeBtns = adj.map(g =>
            `<button class="goal-bridge-btn" onclick="selectGoal('${g}')">${GOAL_LABELS[g]}</button>`
        ).join('');
        html += `<div class="fallback-banner">
            <strong>BEST IN STOCK</strong>
            Limited match in current inventory — these are your strongest options.
            ${bridgeBtns ? `<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">ALSO SCORES WELL FOR: ${bridgeBtns}</div>` : ''}
        </div>`;
    }

    // Cards — no tier label divs
    html += renderCard(topPicks[0], 0);

    if (topPicks.length > 1) {
        for (let i = 1; i < topPicks.length; i++) {
            const backupLabel = getBackupLabel(topPicks[i], topPicks[0]);
            html += renderCard(topPicks[i], i, backupLabel);
        }
    }

    // Also Available (compact, no expansion)
    if (alsoAvail.length > 0) {
        html += `<div class="tier-label-also">Also In Stock (${alsoAvail.length})</div>`;
        html += alsoAvail.map(p => renderCompactCard(p)).join('');
    }

    document.getElementById('productCards').innerHTML = html;

    // Async-upgrade each top pick's say-this drawer with live LLM talking points.
    // DOM renders instantly with template content; LLM patches it in background.
    setTimeout(() => { topPicks.forEach((p, i) => fetchAndUpgradeTalkingPoints(p, i)); }, 0);

    _lastRecommendedIds = topPicks.map(p => p.id);
    logDemandEvent('results_shown', { recommendations: _lastRecommendedIds });
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function formatLabel(v) {
    const m = {
        flower:'Flower', vape:'Vape', edible:'Edible',
        concentrate:'Concentrate', preroll:'Pre-roll',
        tincture:'Tincture', topical:'Topical', capsule:'Capsule'
    };
    return m[v] || cap(v);
}
function onsetLabel(v) {
    return v === 'quick' ? 'Fast onset' : v === 'slow' ? 'Long-lasting' : 'Standard onset';
}
function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function xe(s) {
    return String(s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── QR SESSION SYNC ───────────────────────────────────────────────────────────
// Listens for customers who took the QR quiz and bridges their preferences
// directly to the floor tool — no questions needed when they walk up.

const _seenQRSessions = new Set();
let   _qrQueue        = [];
let   _currentQRRow   = null;
let   _qrDismissTimer = null;

function startQRListener() {
    if (!orgId) return;

    // ── Supabase Realtime (instant push) ──────────────────────────────────
    try {
        sb.channel('cs-qr-' + orgId)
            .on('postgres_changes', {
                event: 'INSERT', schema: 'public', table: 'demand_events',
                filter: `organization_id=eq.${orgId}`
            }, payload => {
                const row = payload.new;
                if (row.source === 'qr' && row.event_type === 'qr_session_ready') {
                    enqueueQRSession(row);
                }
            })
            .subscribe();
    } catch(e) { /* realtime not configured — polling will cover it */ }

    // ── Polling fallback (every 12 seconds) ───────────────────────────────
    setInterval(pollQRSessions, 12000);
    pollQRSessions();
}

async function pollQRSessions() {
    if (!orgId) return;
    const since = new Date(Date.now() - 5 * 60 * 1000).toISOString();
    try {
        const { data, error } = await sb
            .from('demand_events')
            .select('*')
            .eq('organization_id', orgId)
            .eq('source', 'qr')
            .eq('event_type', 'qr_session_ready')
            .gte('created_at', since)
            .order('created_at', { ascending: true });
        if (error) {
            console.warn('[Cannascope QR poll] Supabase error:', error.message, '— check demand_events RLS or table permissions');
        } else {
            console.log('[Cannascope QR poll] rows found:', data?.length ?? 0);
            if (data) data.forEach(enqueueQRSession);
        }
    } catch(e) {
        console.warn('[Cannascope QR poll] network error:', e.message);
    }
}

function enqueueQRSession(row) {
    if (!row?.session_id || _seenQRSessions.has(row.session_id)) return;
    _seenQRSessions.add(row.session_id);
    _qrQueue.push(row);
    updateQRBadge();
    showNextQRSession();
}

function showNextQRSession() {
    const panel = document.getElementById('qrIncoming');
    if (!panel || panel.classList.contains('visible') || _qrQueue.length === 0) return;
    _currentQRRow = _qrQueue.shift();
    updateQRBadge();

    const row       = _currentQRRow;
    const goal      = row.goal || 'relax';
    const goalLabel = GOAL_LABELS[goal] || cap(goal);

    // Parse stored payload — QR page stores { answers: {...}, filters: {...} }
    let qParsed = {};
    try { qParsed = JSON.parse(row.experience || '{}'); } catch(e) {}
    const qAnswers = qParsed.answers || qParsed;   // backwards compat with old flat format
    const qFilters = qParsed.filters  || {};

    // Build filter summary line from answers (richer) with filter fallback
    const parts = [];
    const fmt = qAnswers.format || qFilters.format;
    if (fmt)                                         parts.push(formatLabel(fmt));
    if (qAnswers.avoidSmoke === 'yes')               parts.push('No smoke');
    if (qAnswers.priceSpec === 'budget' || qFilters.priceSpec === 'budget') parts.push('Under $40');
    if (qAnswers.wantsCbd  === 'yes')                parts.push('High CBD');
    if (qAnswers.experience === 'new')               parts.push('First timer');
    if (qAnswers.intensity  === 'light')             parts.push('Light dose');
    const summary = parts.length ? parts.join(' · ') : null;

    // Find top product name from live inventory
    const topProduct  = allProducts.find(p => p.id === row.product_id);
    const productLine = topProduct ? 'Top pick: ' + topProduct.name : 'Ready for a recommendation';

    document.getElementById('qrGoalLabel').textContent  = goalLabel + (summary ? '  ·  ' + summary : '');
    document.getElementById('qrProductName').textContent = productLine;

    panel.classList.add('visible');

    // Auto-dismiss after 2 minutes — customer probably moved on
    clearTimeout(_qrDismissTimer);
    _qrDismissTimer = setTimeout(dismissQRSession, 120000);
}

function dismissQRSession() {
    clearTimeout(_qrDismissTimer);
    _currentQRRow = null;
    const panel = document.getElementById('qrIncoming');
    if (panel) panel.classList.remove('visible');
    setTimeout(showNextQRSession, 350);
}

function loadQRCustomer() {
    if (!_currentQRRow) return;
    const row  = _currentQRRow;
    const goal = row.goal || 'relax';

    // Restore full filter state from QR session
    // QR sends { answers: { goal, experience, format, intensity, priceSpec, ageRange }, filters: {...} }
    let qParsed = {};
    try { qParsed = JSON.parse(row.experience || '{}'); } catch(e) {}

    const qAnswers = qParsed.answers || qParsed; // backwards compat with old flat format
    const qFilters = qParsed.filters  || {};

    // Store full customer answers so buildCustomerContext() can send them to Claude
    window._qrCustomerAnswers = qAnswers;

    // Tag the session so results can show "From QR" on the matching product
    window._qrActiveProductId = row.product_id || null;

    dismissQRSession();

    // Navigate with customer's preferences pre-loaded — pass preserveFilters=true
    // so selectGoal() doesn't wipe the QR filters before scoring runs
    filters      = qFilters;
    selectedGoal = null;
    selectGoal(goal, true);
}

function updateQRBadge() {
    const badge = document.getElementById('qrQueueBadge');
    if (!badge) return;
    if (_qrQueue.length > 0) {
        badge.textContent = '+' + _qrQueue.length + ' waiting';
        badge.classList.add('visible');
    } else {
        badge.classList.remove('visible');
    }
}

// ── QR BANNER TEST TRIGGER ────────────────────────────────────────────────────
// Run in browser console: __testQRBanner() to fire a fake QR session
// Useful for verifying the banner UI works independently of Supabase
window.__testQRBanner = function(goal = 'relax') {
    const fakeRow = {
        session_id:  'test-' + Date.now(),
        organization_id: orgId,
        source:      'qr',
        event_type:  'qr_session_ready',
        goal,
        product_id:  allProducts[0]?.id || null,
        experience:  JSON.stringify({
            answers: { goal, experience: 'casual', format: 'vape', intensity: 'moderate' },
            filters: { format: 'vape', experience: 'casual' }
        }),
        created_at:  new Date().toISOString(),
    };
    enqueueQRSession(fakeRow);
    console.log('[Cannascope] Test QR banner fired. If nothing appears, check DOM for #qrIncoming.');
};

// ── TEST HARNESS ──────────────────────────────────────────────────────────────
window.__runTests = function() {
    console.log('=== CANNASCOPE ENGINE TEST HARNESS ===');
    const savedFilters = filters, savedGoal = selectedGoal;
    let pass = 0, fail = 0;

    function assert(name, condition, details) {
        const status = condition ? 'PASS' : 'FAIL';
        if (condition) pass++; else fail++;
        console.log(`[${status}] ${name}${details ? ' → ' + details : ''}`);
    }

    function run(name, goal, filterSet) {
        filters = filterSet; selectedGoal = goal;
        const eligible = allProducts.filter(p => passesHardFilters(p));
        const scored   = eligible
            .map(p => ({ ...p, _result: scoreProduct(p, goal) }))
            .sort((a, b) => b._result.score - a._result.score);
        return { top: scored[0], all: scored, eligible };
    }

    let r;
    r = run('Sleep/no filters', 'sleep', {});
    assert('Sleep/no filters returns results', r.top !== undefined, r.top?.name);
    assert('Sleep/no filters score > 0', r.top && r.top._result.score > 0, r.top?._result.score + '%');
    assert('Sleep top has sleep-relevant terpenes',
        r.top && ((parseFloat(r.top.t_myrcene)||0) >= 0.3 || (parseFloat(r.top.t_linalool)||0) >= 0.2),
        r.top?.name);

    r = run('Sleep/first-timer', 'sleep', { experience: 'new' });
    assert('Sleep/first-timer excludes THC>20',
        !r.eligible.some(p => (parseFloat(p.thc) || 0) > 20), `${r.eligible.length} eligible`);

    r = run('Sleep/edible', 'sleep', { format: 'edible' });
    assert('Sleep/edible shows only edibles',
        !r.eligible.some(p => (p.category || '').toLowerCase() !== 'edible'), `${r.eligible.length} found`);

    r = run('Social/no smoking', 'social', { avoidSmoke: 'yes' });
    assert('Social/no smoking excludes combustion',
        !r.eligible.some(p => ['flower','preroll','concentrate'].includes((p.category||'').toLowerCase())), `${r.eligible.length}`);

    r = run('Relief/CBD priority', 'relief', { wantsCbd: 'yes' });
    assert('Relief/CBD top has CBD', r.top && (parseFloat(r.top.cbd) || 0) > 0, r.top?.name);

    r = run('Focus top is limonene-dominant', 'focus', {});
    assert('Focus: top has limonene or terpinolene',
        r.top && ((parseFloat(r.top.t_limonene)||0) >= 0.3 || (parseFloat(r.top.t_terpinolene)||0) >= 0.25),
        r.top?.name);

    r = run('Relax/no filters → 3+', 'relax', {});
    assert('No-filter search returns 3+ products', r.all.length >= 3);

    r = run('Score range 0-100', 'focus', {});
    assert('All scores 0-100', !r.all.some(p => p._result.score < 0 || p._result.score > 100));

    r = run('Price budget filter', 'sleep', {});
    filters = { priceSpec: 'budget' };
    const budgetProds = allProducts.filter(p => passesHardFilters(p));
    assert('Budget filter excludes >$40', !budgetProds.some(p => (parseFloat(p.price)||0) > 40));

    filters = savedFilters; selectedGoal = savedGoal;
    console.log(`\n=== RESULTS: ${pass} passed, ${fail} failed ===`);
    if (fail === 0) console.log('✅ All tests passed!');
    else console.warn(`⚠️  ${fail} test(s) failed`);
    return { pass, fail };
};
