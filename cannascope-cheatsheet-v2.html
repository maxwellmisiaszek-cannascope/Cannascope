<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cannascope — Floor Assist</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --accent:        #2D6A4F;
            --accent-mid:    #40916C;
            --accent-light:  #EAF4EE;
            --accent-border: #A8D5B8;
            --amber:         #92400E;
            --amber-bg:      #FFFBEB;
            --amber-border:  #FDE68A;
            --bg:            #F8F9FB;
            --surface:       #FFFFFF;
            --surface-2:     #F2F4F7;
            --border:        #E4E8EF;
            --border-2:      #C8CDD8;
            --text:          #111827;
            --text-2:        #4B5563;
            --text-3:        #9CA3AF;
            --red:           #DC2626;
            --red-bg:        #FEF2F2;
            --red-border:    #FECACA;
        }

        html, body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── HEADER ───────────────────────────────────────── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 52px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .wordmark {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text);
        }
        .wordmark-accent { color: var(--accent); }
        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .org-label {
            font-size: 12px;
            color: var(--text-2);
            font-weight: 500;
        }
        .inventory-badge {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 100px;
        }
        .inventory-badge.loaded {
            color: var(--accent);
            background: var(--accent-light);
            border-color: var(--accent-border);
        }

        /* ── SCREENS ──────────────────────────────────────── */
        .screen { display: none; }
        .screen.active { display: block; min-height: calc(100vh - 52px); }

        /* ── SCREEN A: GOAL SELECTION ─────────────────────── */
        #screenGoal {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 20px 100px; /* bottom pad for ticker */
            min-height: calc(100vh - 52px);
        }
        #screenGoal.active { display: flex; }

        .served-flash {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-light);
            border: 1px solid var(--accent-border);
            border-radius: 100px;
            padding: 5px 14px;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .served-flash.visible { opacity: 1; }

        /* goal screen tagline */
        .goal-tagline {
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-3);
            letter-spacing: 0.01em;
            text-align: center;
        }
        .goal-tagline-accent { color: var(--accent); font-weight: 600; }

        /* ── TICKER BAR ────────────────────────────────────── */
        .ticker-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 36px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: center;
            z-index: 50;
        }
        /* only show on goal screen */
        #screenResults.active ~ .ticker-bar,
        #screenResults.active + .ticker-bar { display: none; }
        .ticker-track {
            display: flex;
            align-items: center;
            animation: ticker-scroll 40s linear infinite;
            white-space: nowrap;
            will-change: transform;
        }
        .ticker-track:hover { animation-play-state: paused; }
        @keyframes ticker-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 28px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-3);
            letter-spacing: 0.01em;
            white-space: nowrap;
        }
        .ticker-item b { color: var(--text-2); font-weight: 600; }
        .ticker-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            opacity: 0.5;
        }

        .goal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 560px;
        }
        .goal-btn {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 18px 16px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            text-align: left;
            transition: border-color 0.1s, background 0.1s, transform 0.08s;
        }
        .goal-btn:hover {
            border-color: var(--border-2);
            background: var(--surface-2);
        }
        .goal-btn:active { transform: scale(0.97); }
        .goal-name {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.015em;
            color: var(--text);
        }
        .goal-sub {
            font-size: 11px;
            color: var(--text-3);
            line-height: 1.4;
        }

        /* ── SUB-HEADER ───────────────────────────────────── */
        .sub-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            height: 48px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: sticky;
            top: 52px;
            z-index: 100;
        }
        .btn-back {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
            background: none;
            border: 1px solid var(--border-2);
            border-radius: 7px;
            padding: 5px 11px;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.1s;
        }
        .btn-back:hover { border-color: var(--text-3); color: var(--text); }
        .goal-pill {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-light);
            border: 1px solid var(--accent-border);
            padding: 4px 12px;
            border-radius: 100px;
            flex-shrink: 0;
            letter-spacing: -0.01em;
        }
        .sub-spacer { flex: 1; }
        .btn-new-customer {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: -0.01em;
            transition: background 0.1s, transform 0.08s;
        }
        .btn-new-customer:hover  { background: #245c43; }
        .btn-new-customer:active { transform: scale(0.97); }

        /* ── REFINE TRAY — always-on bar ─────────────────── */
        .refine-tray {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 9px 16px;
            position: sticky;
            top: 100px;
            z-index: 90;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .refine-tray::-webkit-scrollbar { display: none; }
        .refine-inner {
            display: flex;
            gap: 6px;
            white-space: nowrap;
        }
        .refine-chip {
            height: 30px;
            padding: 0 12px;
            background: var(--surface);
            border: 1px solid var(--border-2);
            border-radius: 7px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.1s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            flex-shrink: 0;
        }
        .refine-chip:hover { border-color: var(--text-3); color: var(--text); }
        .refine-chip.active {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 600;
        }
        .refine-sep {
            width: 1px;
            height: 18px;
            background: var(--border);
            flex-shrink: 0;
            align-self: center;
        }

        /* ── RESULTS LIST ─────────────────────────────────── */
        .results-list {
            padding: 16px 14px 32px;
            max-width: 680px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── TIER LABELS ──────────────────────────────────── */
        .tier-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 8px;
        }
        .tier-label-also {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--text-3);
            margin: 28px 0 8px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        /* ── PRODUCT CARD ─────────────────────────────────── */
        .prod-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .prod-card.rank-1 {
            border-left: 3px solid var(--accent);
            box-shadow: 0 2px 16px rgba(45, 106, 79, 0.12);
        }

        /* card header */
        .card-header {
            padding: 16px 16px 0;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }
        .card-header-left { flex: 1; min-width: 0; }
        .card-rank-badge {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .prod-card.rank-1 .card-rank-badge { color: var(--accent); }
        .mgr-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--amber);
            flex-shrink: 0;
            cursor: help;
        }
        .card-name {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text);
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .prod-card:not(.rank-1) .card-name { font-size: 15px; }
        .card-meta-row {
            font-size: 12px;
            color: var(--text-2);
            margin-top: 3px;
        }
        .card-header-right {
            text-align: right;
            flex-shrink: 0;
        }
        .card-price {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text);
        }
        .prod-card:not(.rank-1) .card-price { font-size: 15px; }
        .card-shelf {
            font-size: 11px;
            color: var(--text-3);
            font-weight: 500;
            margin-top: 2px;
        }

        /* ── REDESIGNED CARD INTERNALS ───────────────────── */
        .card-main {
            padding: 16px 16px 14px;
        }
        .card-top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }
        .card-shelf-pill {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            background: rgba(76,175,128,0.1);
            border: 1px solid rgba(76,175,128,0.25);
            border-radius: 20px;
            padding: 2px 9px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .card-ind {
            font-size: 9px;
            font-weight: 700;
            border-radius: 3px;
            padding: 1px 4px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .qr-ind {
            background: rgba(76,175,128,0.15);
            color: var(--accent);
            border: 1px solid rgba(76,175,128,0.3);
        }
        .mgr-ind {
            background: rgba(251,191,36,0.15);
            color: #fbbf24;
            border: 1px solid rgba(251,191,36,0.3);
        }
        .card-meta-strip {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            letter-spacing: 0.01em;
        }
        .card-actions-inline {
            margin-top: 12px;
        }

        /* pitch line */
        .card-pitch {
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.55;
            margin-bottom: 12px;
        }
        .prod-card.rank-1 .card-pitch {
            font-size: 14px;
            color: var(--text);
        }

        /* action row */
        .card-actions {
            padding: 12px 16px 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .btn-say-this {
            height: 38px;
            background: var(--surface);
            border: 1px solid var(--border-2);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.1s;
        }
        .btn-say-this:hover { border-color: var(--text-3); color: var(--text); }
        .btn-say-this.open {
            background: var(--surface-2);
            color: var(--text);
            border-color: var(--border-2);
        }
        .rec-btn {
            height: 38px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: -0.01em;
            transition: background 0.12s;
        }
        .rec-btn:hover { background: #245c43; }
        .rec-btn:active { transform: scale(0.97); }
        .rec-btn.recommended {
            background: #1a4532;
        }

        /* say this drawer */
        .say-this-drawer {
            display: none;
            border-top: 1px solid var(--border);
            padding: 14px 16px;
            background: var(--surface-2);
        }
        .say-this-drawer.open { display: block; }
        .say-this-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 10px;
        }
        .say-this-bullets {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .say-this-bullet {
            font-size: 13px;
            color: var(--text);
            line-height: 1.55;
            padding-left: 16px;
            position: relative;
        }
        .say-this-bullet::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: 700;
        }
        .say-this-next {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-2);
            font-style: italic;
            line-height: 1.5;
        }
        .say-this-next strong {
            font-style: normal;
            font-weight: 600;
            color: var(--text-2);
        }
        /* LLM upgrade states */
        .say-this-drawer.tp-loading .say-this-bullets {
            opacity: 0.4;
            pointer-events: none;
        }
        .say-this-drawer.tp-loading .say-this-opening,
        .say-this-drawer.tp-loading .say-this-next {
            opacity: 0.4;
        }
        .tp-live-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(76,175,128,0.12);
            border: 1px solid rgba(76,175,128,0.3);
            border-radius: 4px;
            padding: 1px 5px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .btn-details-link {
            display: inline-block;
            margin-top: 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            padding: 0;
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: color 0.1s;
        }
        .btn-details-link:hover { color: var(--text-2); }

        /* details drawer */
        .details-drawer {
            display: none;
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            background: #FAFBFD;
        }
        .details-drawer.open { display: block; }
        .detail-block {
            margin-bottom: 10px;
        }
        .detail-block:last-child { margin-bottom: 0; }
        .detail-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 3px;
        }
        .detail-text {
            font-size: 12px;
            color: var(--text-2);
            line-height: 1.6;
        }
        .detail-potency-mild   { color: var(--accent); }
        .detail-potency-mod    { color: var(--text-2); }
        .detail-potency-strong { color: var(--red); }
        .detail-mgr-text {
            font-size: 12px;
            color: var(--amber);
            line-height: 1.5;
        }
        .detail-label-mgr { color: var(--amber) !important; }

        /* ── COMPACT CARD (Also Available) ────────────────── */
        .prod-card-compact {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 5px;
        }
        .compact-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
        }
        .compact-meta {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 2px;
        }
        .compact-right {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-2);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── FALLBACK BANNER ──────────────────────────────── */
        .fallback-banner {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.55;
            margin-bottom: 12px;
        }
        .fallback-banner strong {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }

        /* goal bridge fallback */
        .goal-bridge {
            text-align: center;
            padding: 40px 20px;
        }
        .goal-bridge-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .goal-bridge-sub {
            font-size: 13px;
            color: var(--text-2);
            margin-bottom: 20px;
        }
        .goal-bridge-btns {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .goal-bridge-btn {
            padding: 9px 18px;
            background: var(--surface);
            border: 1.5px solid var(--border-2);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.1s;
        }
        .goal-bridge-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

        /* ── LOADING / EMPTY ──────────────────────────────── */
        .loading-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-3);
            font-size: 13px;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-2);
            font-size: 13px;
            line-height: 1.65;
        }
        .empty-state strong {
            display: block;
            font-size: 14px;
            color: var(--text);
            margin-bottom: 6px;
        }

        /* ── QR INCOMING CUSTOMER ────────────────────────── */
        .qr-incoming {
            position: fixed;
            top: 52px;
            left: 0;
            right: 0;
            z-index: 300;
            background: var(--surface);
            border-bottom: 2px solid var(--accent);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(45, 106, 79, 0.14);
            transform: translateY(-110%);
            transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .qr-incoming.visible { transform: translateY(0); }
        .qr-incoming-tag {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: var(--accent);
            background: var(--accent-light);
            border: 1px solid var(--accent-border);
            padding: 3px 8px;
            border-radius: 100px;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .qr-incoming-info {
            flex: 1;
            min-width: 0;
        }
        .qr-incoming-goal {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.015em;
            line-height: 1.3;
        }
        .qr-incoming-product {
            font-size: 11px;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

        .card-shelf-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;

            .goal-grid { gap: 10px; }
            .goal-btn { padding: 22px 18px; }

// ── STRAIN TERPENE LOOKUP ─────────────────────────────────────────────────────
// Match product name against known strain names.
// Returns longest match (most specific) or null if no match found.
function lookupStrainTerpenes(productName) {
    if (!productName) return null;
    const n = productName.toLowerCase()
        .replace(/[^a-z0-9 ]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

    if (STRAIN_TERPENES[n]) return STRAIN_TERPENES[n];

    // Find longest matching strain name contained in product name
    // (longest = most specific, avoids 'kush' matching before 'og kush')
    let bestMatch = null, bestLen = 0;
    for (const strainName of Object.keys(STRAIN_TERPENES)) {
        if (n.includes(strainName) && strainName.length > bestLen) {
            bestMatch = STRAIN_TERPENES[strainName];
            bestLen   = strainName.length;
        }
    }
    return bestMatch;
}

// ── DEMAND LOGGING ────────────────────────────────────────────────────────────
async function logDemandEvent(event_type, options = {}) {
    if (!orgId) return;
    await sb.from('demand_events').insert({
        session_id:      SESSION_ID,
        organization_id: orgId,
        source:          'budtender',
        goal:            selectedGoal        || null,
        format_pref:     filters.format      || null,
        experience:      filters.experience  || null,
        event_type,
        recommendations: options.recommendations || [],
        product_id:      options.product_id      || null,
        product_rank:    options.product_rank    || null
    });
}

// ── MARK SOLD ─────────────────────────────────────────────────────────────────
let _salesToday = parseInt(sessionStorage.getItem('cs_sales_today') || '0');
const _productSaleCounts = new Map(); // productId → count for this session

function markSold(btn, productId, rank) {
    const prev  = _productSaleCounts.get(productId) || 0;
    const count = prev + 1;
    _productSaleCounts.set(productId, count);

    btn.textContent = count === 1 ? '✓ Sold' : `✓ Sold ×${count}`;
    btn.classList.add('sold-once');

    // Increment daily counter
    _salesToday++;
    sessionStorage.setItem('cs_sales_today', _salesToday);
    _showSaleFlash(_salesToday);

    logDemandEvent('sale_confirmed', {
        product_id:      productId,
        product_rank:    rank,
        recommendations: _lastRecommendedIds
    });

    // Only clear QR context on the first sale — subsequent taps are re-sells
    if (count === 1) {
        window._qrCustomerAnswers  = null;
        window._qrActiveProductId  = null;
    }
    // No auto-navigate — budtender taps New Customer when ready
}

function _showSaleFlash(count) {
    let flash = document.getElementById('saleFlash');
    if (!flash) {
        flash = document.createElement('div');
        flash.id = 'saleFlash';
        flash.style.cssText = `
            position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
            background:#1a4532; border:1px solid var(--accent); border-radius:24px;
            padding:10px 20px; font-size:13px; font-weight:700; color:var(--accent);
            z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none;
            white-space:nowrap;
        `;
        document.body.appendChild(flash);
    }
    flash.textContent = `Sale logged · ${count} today`;
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 2500);
}

// ── LEARNING LOOP — load org score weights ───────────────────────────────────
// Reads the nightly-computed multipliers (goal × format) from org_score_weights.
// Applied at scoring time so the algorithm self-corrects based on what actually sells.
async function loadOrgScoreWeights(id) {
    try {
        const { data, error } = await sb
            .from('org_score_weights')
            .select('adjustments')
            .eq('organization_id', id)
            .single();
        if (!error && data?.adjustments) {
            const parsed = typeof data.adjustments === 'string'
                ? JSON.parse(data.adjustments)
                : data.adjustments;
            _orgScoreWeights = parsed || {};
            console.log('[Cannascope] score weights loaded:', Object.keys(_orgScoreWeights));
        }
    } catch (e) {
        // Non-fatal — fall back to unweighted scoring
        console.warn('[Cannascope] score weights not loaded:', e.message);
    }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function loadOrg(key) {
    const { data: org, error: orgErr } = await sb.from('organizations').select('id,name').eq('public_key', key).single();
    if (orgErr) console.error('[Cannascope] org lookup error:', orgErr);
    if (org) {
        localStorage.setItem('cs_public_key', key);
        orgId   = org.id;
        orgName = org.name;
        document.getElementById('orgLabel').textContent = org.name;
        const { data: prods, error: prodErr } = await sb.from('products')
            .select('*').eq('organization_id', orgId);
        if (prodErr) console.error('[Cannascope] products error:', prodErr);
        allProducts = (prods || []).filter(p => p.in_stock !== false).map(normalizeProduct);
        _lastSyncTime = Date.now();
        const el = document.getElementById('productCount');
        el.textContent = allProducts.length + ' products';
        el.classList.add('loaded');
        updateTaglineCount(allProducts.length);

        // Dutchie live overlay
        const dutchieId = localStorage.getItem('cs_dutchie_id');
        if (dutchieId) {
            (async () => {
                try {
                    const resp = await fetch('/api/dutchie?dispensaryId=' + encodeURIComponent(dutchieId));
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const { products: liveProducts } = await resp.json();
                    if (!liveProducts || !liveProducts.length) return;
                    const supabaseByName = new Map(allProducts.map(p => [p.name.trim().toLowerCase(), p]));
                    const merged = [];
                    for (const lp of liveProducts) {
                        const key = lp.name.trim().toLowerCase();
                        const existing = supabaseByName.get(key);
                        if (existing) {
                            merged.push({ ...existing, in_stock: lp.in_stock, price: lp.price || existing.price });
                        } else {
                            merged.push(normalizeProduct(lp));
                        }
                    }
                    allProducts = merged.filter(p => p.in_stock !== false);
                    el.textContent = allProducts.length + ' products · live';
                } catch (e) {
                    console.warn('[Cannascope] Dutchie live sync skipped:', e.message);
                }
            })();
        }
        // Load learned score weights in background — non-blocking
        loadOrgScoreWeights(org.id);

        startQRListener();
        return true;
    }
    return false;
}

(async () => {
    const params   = new URLSearchParams(location.search);
    const urlKey   = params.get('key');
    const savedKey = localStorage.getItem('cs_public_key');
    const key      = urlKey || savedKey;
    if (key) {
        const ok = await loadOrg(key);
        if (!ok) { localStorage.removeItem('cs_public_key'); promptForKey(); }
    } else { promptForKey(); }
})();

async function submitKeyPrompt() {
    const key = document.getElementById('keyPromptInput').value.trim();
    if (!key) return;
    const ok = await loadOrg(key);
    if (ok) { window._keyOverlay && window._keyOverlay.remove(); }
    else { document.getElementById('keyPromptErr').style.display = 'block'; }
}

function skipToDemo() {
    window._keyOverlay && window._keyOverlay.remove();
    useDemoMode();
}

function normalizeProduct(p) {
    if (p.score_pain     != null && p.score_relief   == null) p.score_relief   = p.score_pain;
    if (p.score_balanced != null && p.score_beginner == null) p.score_beginner = p.score_balanced;

    // Auto-fill terpene data from strain lookup if no lab data present
    if (!hasTerpeneData(p)) {
        const found = lookupStrainTerpenes(p.name);
        if (found) {
            Object.assign(p, found);
            p._terpeneSource = 'lookup'; // flag for transparency
        }
    }

    return p;
}

// Staleness indicator — runs every minute to show how fresh the inventory is
function updateStalenessIndicator() {
    if (!_lastSyncTime) return;
    const el = document.getElementById('productCount');
    if (!el) return;
    const minsAgo = Math.floor((Date.now() - _lastSyncTime) / 60000);
    const count   = allProducts.length;
    const isStale = minsAgo > 30;
    if (minsAgo < 2) {
        el.textContent = count + ' products';
    } else if (isStale) {
        el.textContent = count + ' products · ⚠ ' + minsAgo + 'm ago';
        el.classList.add('stale');
    } else {
        el.textContent = count + ' products · ' + minsAgo + 'm ago';
        el.classList.remove('stale');
    }
}
setInterval(updateStalenessIndicator, 60000);

    inner.innerHTML = '';
    const chips = REFINE_GOAL_NEW[goal] || [];
    chips.forEach(chip => inner.appendChild(makeRefineChip(chip)));

function makeRefineChip(chip) {
    const btn = document.createElement('button');
    btn.className = 'refine-chip';
    btn.textContent = chip.label;
    btn.dataset.group = chip.group;
    btn.dataset.val   = chip.val;
    btn.onclick = () => toggleRefineChip(btn);
    return btn;
}

function toggleRefineChip(btn) {
    const group    = btn.dataset.group;
    const val      = btn.dataset.val;
    const wasActive = btn.classList.contains('active');

    // Deactivate all chips in the same group
    document.querySelectorAll(`.refine-chip[data-group="${group}"]`)
        .forEach(c => { c.classList.remove('active'); delete filters[group]; });

    if (!wasActive) {
        btn.classList.add('active');
        filters[group] = val;
    }

    // Re-run scoring with new filter
    findProducts();
}

// ── HARD FILTERS ──────────────────────────────────────────────────────────────
// Merges chip filters with QR customer answers so both paths drive the scoring engine.
function passesHardFilters(p) {
    if (p.in_stock === false) return false;

    const qa = window._qrCustomerAnswers || {};

    // Format — chip filter takes priority, then QR answer
    const activeFormat = filters.format || qa.format || null;
    if (activeFormat) {
        if ((p.category || '').toLowerCase() !== activeFormat) return false;
    }
    // No smoking — chip or QR avoidSmoke answer
    const avoidSmoke = filters.avoidSmoke || (qa.avoidSmoke === 'yes' ? 'yes' : null);
    if (avoidSmoke === 'yes') {
        const cat = (p.category || '').toLowerCase();
        if (['flower', 'preroll', 'concentrate'].includes(cat)) return false;
    }
    // First-timer THC gate — chip or QR experience answer
    const activeExperience = filters.experience || qa.experience || null;
    if (activeExperience === 'new') {
        if ((parseFloat(p.thc) || 0) > 20) return false;
    }
    // Price (standard ranges from filter screen)
    if (filters.price) {
        const price = parseFloat(p.price) || 0;
        if (!priceMatches(price, filters.price)) return false;
    }
    // Price spec — chip or QR priceSpec answer
    const activePriceSpec = filters.priceSpec || qa.priceSpec || null;
    if (activePriceSpec) {
        const price = parseFloat(p.price) || 0;
        if (activePriceSpec === 'budget'  && price > 40)  return false;
        if (activePriceSpec === 'premium' && price < 50)  return false;
    }

    return true;
}

function priceMatches(price, pf) {
    return (pf === '20-30' && price >= 20 && price <= 30) ||
           (pf === '30-45' && price >  30 && price <= 45) ||
           (pf === '45-60' && price >  45 && price <= 60) ||
           (pf === '60+'   && price >  60);
}

// ── NAME KEYWORD SCORING ─────────────────────────────────────────────────────
function computeNameScore(name, brand, eff) {
    const n = ((name || '') + ' ' + (brand || '')).toLowerCase();
    const keywordMap = {
        sleep:    ['sleep','night','cbn','dream','rest ','slumber','bedtime',' pm','knockout','zz','snooze','dusk','nite'],
        relax:    ['relax','calm','chill','unwind','ease','mellow','serene','tranquil','stress','soothe','gentle'],
        focus:    ['focus','day','daytime','clarity','clear','uplift','energy','morning','alert','productive','wake','bright','rise','elevate','sativa'],
        social:   ['social','party','euphori','happy','uplift','laugh','joy','creative','festival','outdoor','vibe','bliss'],
        relief:   ['relief','pain','recover','inflammation','ache','sore','cramp','therapy','medicinal','cbg','ratio','muscle'],
        beginner: ['micro','microdose','light','gentle','easy','mild','1:1',':1','1mg','2.5mg','5mg','low dose','intro','starter'],
    };
    const hits = (keywordMap[eff] || []).filter(kw => n.includes(kw)).length;
    return Math.min(0.90, hits * 0.35);
}

// ── SCORING ENGINE ────────────────────────────────────────────────────────────
function hasTerpeneData(p) {
    return Object.keys(TERPENE_EFFECTS).some(t => (parseFloat(p[t]) || 0) > 0);
}

function computeTerpeneScore(p, eff) {
    let weightedSum = 0, totalWeight = 0;
    const breakdown = [];
    for (const [col, affinityMap] of Object.entries(TERPENE_EFFECTS)) {
        const amt      = parseFloat(p[col]) || 0;
        const affinity = affinityMap[eff]   || 0;
        if (amt === 0) continue;
        weightedSum += amt * affinity;
        totalWeight += amt;
        if (affinity >= 0.60 && amt >= 0.10)
            breakdown.push({ terpene: col.replace('t_', ''), amount: amt, affinity });
    }
    const score = totalWeight > 0 ? Math.min(weightedSum / totalWeight, 1.0) : 0;
    breakdown.sort((a, b) => (b.amount * b.affinity) - (a.amount * a.affinity));
    return { score, breakdown };
}

function scoreProduct(p, eff) {
    const reasons = [], penalties = [];
    let earned = 0, possible = 0;
    const dbg = {};
    let terpeneEarned = 0;

    // 1. TERPENE FIT (30 pts)
    possible += 30;
    if (hasTerpeneData(p)) {
        const { score: ts, breakdown } = computeTerpeneScore(p, eff);
        terpeneEarned = Math.round(ts * 30);
        earned += terpeneEarned;
        breakdown.slice(0, 2).forEach(b => {
            reasons.push(`${cap(b.terpene)} (${(b.amount * 100).toFixed(1)}%) → ${GOAL_LABELS[eff].toLowerCase()}`);
        });
        if (breakdown.length === 0 && ts > 0.25)
            reasons.push(`Terpene profile has moderate ${GOAL_LABELS[eff].toLowerCase()} affinity`);
    } else {
        const rawScore  = parseFloat(p['score_' + eff]) || 0.35;
        const nameBonus = computeNameScore(p.name, p.brand, eff);
        const normalizedBase = Math.max(0, Math.min(1.0, (rawScore - 0.20) / 0.45));
        const combined = Math.min(1.0, normalizedBase + nameBonus * 0.40);
        terpeneEarned = Math.round(combined * 26);
        earned += terpeneEarned;
        if (combined >= 0.55) {
            reasons.push(nameBonus > 0
                ? `Product name and profile suggest ${GOAL_LABELS[eff].toLowerCase()} use`
                : `Strain profile rated for ${GOAL_LABELS[eff].toLowerCase()}`);
        }
    }
    dbg.terpene = `${terpeneEarned}/30`;

    // 2. FORMAT (20 pts)
    if (filters.format) {
        possible += 20; earned += 20;
        reasons.push(`${formatLabel(filters.format)} format matches preference`);
        dbg.format = '20/20';
    } else { dbg.format = 'n/a'; }

    // 3. INTENSITY (20 pts)
    const thc = parseFloat(p.thc) || 0;
    let intensityEarned = 0;
    // Use QR intensity answer as fallback when no chip is selected
    const activeIntensity = filters.intensity || (window._qrCustomerAnswers || {}).intensity || null;
    if (activeIntensity) {
        possible += 20;
        const inRange = (activeIntensity === 'mild'     && thc <  15) ||
                        (activeIntensity === 'moderate'  && thc >= 15 && thc <= 22) ||
                        (activeIntensity === 'strong'    && thc >  22);
        if (inRange) { intensityEarned = 20; reasons.push(`THC ${thc}% fits preference`); }
        earned += intensityEarned;
        dbg.intensity = `${intensityEarned}/20`;
    } else { dbg.intensity = 'n/a'; }

    // 4. PRICE (10 pts)
    if (filters.price) {
        possible += 10; earned += 10;
        dbg.price = '10/10';
    } else { dbg.price = 'n/a'; }

    // 5. ONSET (10 pts)
    let onsetEarned = 0;
    if (filters.onset) {
        possible += 10;
        const cat   = (p.category || '').toLowerCase();
        const onset = ONSET_MAP[cat] || 'moderate';
        if (onset === filters.onset) { onsetEarned = 10; }
        else if (onset !== 'none') { penalties.push(`Onset: ${formatLabel(cat)} delivers ${onsetLabel(onset)}`); }
        earned += onsetEarned;
        dbg.onset = `${onsetEarned}/10`;
    } else { dbg.onset = 'n/a'; }

    // 6. INVENTORY PRIORITY (5 pts)
    possible += 5;
    const note = (p.manager_note || '').toLowerCase();
    let bizPts = 0;
    if (note.includes('overstock') || note.includes('over stock')) bizPts = 5;
    else if (note.includes('push') || note.includes('move'))       bizPts = 4;
    else if (note.includes('margin') || note.includes('promo'))    bizPts = 3;
    else if (note.includes('brand') || note.includes('feature'))   bizPts = 2;
    earned += bizPts;
    dbg.business = `${bizPts}/5`;

    // PENALTIES
    let penaltyTotal = 0;
    if (filters.experience === 'new' && thc > 15) {
        penaltyTotal += Math.min(10, Math.round((thc - 15) * 1.5));
        penalties.push(`THC ${thc}% is elevated for a first-time user`);
    }
    const cbd = parseFloat(p.cbd) || 0;
    if (filters.wantsCbd === 'yes') {
        if (cbd < 1) { penaltyTotal += 12; penalties.push(`Low CBD content`); }
        else { earned += 5; reasons.push(`CBD ${cbd}% matches preference`); }
    }
    if (hasTerpeneData(p) && terpeneEarned < 9) {
        penaltyTotal += 8;
        penalties.push(`Weak terpene alignment for ${GOAL_LABELS[eff].toLowerCase()}`);
    }
    earned = Math.max(0, earned - penaltyTotal);
    dbg.penalties = penaltyTotal > 0 ? `-${penaltyTotal}` : '0';

    const pct        = possible > 0 ? Math.round((earned / possible) * 100) : 0;
    const score      = Math.max(0, Math.min(100, pct));
    const confidence = score >= 65 ? 'HIGH' : score >= 45 ? 'MEDIUM' : 'LOW';

    return { score, confidence, reasons, penalties, earned, possible, debug: dbg };
}

// ── DIVERSITY PICKER ──────────────────────────────────────────────────────────
function pickDiverseTop3(pool) {
    if (pool.length <= 3) return pool;
    const selected = [], usedBrands = new Set(), usedCats = new Set();
    for (const p of pool) {
        if (selected.length >= 3) break;
        const brand = (p.brand    || '').toLowerCase();
        const cat   = (p.category || '').toLowerCase();
        const brandOk = !usedBrands.has(brand) || usedBrands.size === 0;
        const catOk   = !usedCats.has(cat)     || usedCats.size   === 0;
        if (selected.length === 0 || brandOk || catOk) {
            selected.push(p); usedBrands.add(brand); usedCats.add(cat);
        }
    }
    if (selected.length < 3) {
        for (const p of pool) {
            if (selected.length >= 3) break;
            if (!selected.includes(p)) selected.push(p);
        }
    }
    return selected;
}

// ── ROTATION SEED ─────────────────────────────────────────────────────────────
function getRotationSeed() {
    const now = new Date();
    return Math.floor((now.getFullYear() * 10000 + (now.getMonth()+1) * 100 + now.getDate()) * 12
        + Math.floor(now.getHours() / 2));
}
function rotationBonus(productIndex, seed) {
    return ((productIndex + seed) % 7 === 0) ? 4 :
           ((productIndex + seed) % 5 === 0) ? 2 : 0;
}

// ── PITCH LINE ────────────────────────────────────────────────────────────────
function generatePitch(p, eff) {
    const cat     = (p.category || '').toLowerCase();
    const isQuick = ['flower', 'vape', 'preroll', 'concentrate'].includes(cat);
    const isSlow  = ['edible', 'capsule', 'patch'].includes(cat);
    switch (eff) {
        case 'sleep':
            if (isQuick) return 'Fast-acting — great for customers who have trouble falling asleep.';
            if (isSlow)  return 'Long-lasting sleep support — good for customers who wake up during the night.';
            return 'Well-suited for nighttime use and winding down.';
        case 'relax':
            if (isQuick) return 'Quick body relaxation — takes the edge off without being overwhelming.';
            if (isSlow)  return 'Steady, long-lasting relaxation — ideal for a full evening of unwinding.';
            return 'Smooth and manageable — a clean decompress.';
        case 'focus':
            if (isSlow)  return 'Sustained mental clarity over several hours — good for long work sessions.';
            return 'Clear-headed and uplifting — helps customers stay productive without anxiety.';
        case 'social':
            if (isQuick) return 'Fast mood lift — great for events, being outdoors, or socializing.';
            if (isSlow)  return 'Gradual, lasting energy — good for all-day events or long nights.';
            return 'Uplifting and energetic — a solid pick for social situations.';
        case 'relief':
            if (cat === 'topical') return 'Targeted local relief — right to the source, no psychoactive effect.';
            if (isSlow)  return 'Deep, long-lasting relief — good for chronic pain throughout the day.';
            return 'Targets pain and inflammation — strong full-body relief.';
        case 'beginner':
            if (isQuick) return 'Controllable and approachable — easy to find the right amount.';
            return 'Gentle and smooth — ideal for customers who are new or returning after a long break.';
        default:
            return 'Strong match for this customer\'s goal based on product profile.';
    }
}

// ── PARSE STRUCTURED TALKING POINTS ──────────────────────────────────────────
function parseTalkingPoints(raw) {
    if (!raw || !raw.trim()) return null;
    const s = raw.trim();
    if (!s.includes('WHY IT WORKS') && !s.includes('TALKING POINTS')) return { raw: s };
    const sections = {};
    const blocks   = s.split(/\n\n(?=[A-Z][A-Z ]+\n)/);
    for (const block of blocks) {
        const nl = block.indexOf('\n');
        if (nl === -1) continue;
        const header = block.slice(0, nl).trim();
        const body   = block.slice(nl + 1).trim();
        if      (header === 'WHY IT WORKS')    sections.why    = body;
        else if (header === 'TALKING POINTS')  sections.tp     = body;
        else if (header === 'BEST ALONGSIDE')  sections.upsell = body;
        else if (header === 'MANAGER NOTE')    sections.mgr    = body;
    }
    return sections;
}

// ── BOILERPLATE DETECTION ─────────────────────────────────────────────────────
// Returns true if talking points contain known junk/generic text that should
// be replaced by live-generated content.
function isBoilerplate(text) {
    if (!text || text.trim().length < 20) return true;
    const lower = text.toLowerCase();
    const junk = [
        'potency unknown',
        'ask the customer about their tolerance',
        'low thc at 0.0',
        'thc 0.0%',
        '0.0% thc',
        'hybrid genetics produce a balanced terpene',
        'effects are more predictable and versatile across tolerance levels',
        'pure indica or sativa strains',
        'this is a good product',
        'great product for',
        'a versatile option',
        'well-suited for a variety',
    ];
    return junk.some(f => lower.includes(f));
}

// ── PRODUCT VARIANCE HASH ─────────────────────────────────────────────────────
// Stable number derived from product identity — ensures same product always
// picks the same variant, but different products pick different ones.
function productVariance(p) {
    const str = (p.id || '') + (p.name || '') + (p.brand || '');
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = Math.imul(31, h) + str.charCodeAt(i) | 0; }
    return Math.abs(h);
}

function pickV(arr, p) { return arr[productVariance(p) % arr.length]; }

// ── LIVE TALKING POINTS GENERATOR ────────────────────────────────────────────
// Uses actual product data (THC, CBD, format, brand, name) so two similar
// products always produce meaningfully different bullets.
function generateLiveTalkingPoints(p, goal) {
    const thc   = parseFloat(p.thc)  || 0;
    const cbd   = parseFloat(p.cbd)  || 0;
    const cat   = (p.category || '').toLowerCase();
    const brand = p.brand || '';
    const name  = p.name  || 'This product';
    const bullets = [];

    // ── Bullet 1: Format truth — multiple variants so same format ≠ same copy ─
    if (cat === 'edible' || cat === 'capsule') {
        bullets.push(pickV([
            `${name} takes 45–90 minutes to kick in. Biggest mistake: redosing at 45 min thinking it's not working.`,
            `Edible format means effects build slowly and last 6–8 hours. Tell them to take it and leave it alone for 90 minutes.`,
            `Onset is 45–90 min — tell them that up front. Most bad edible experiences start with "it wasn't doing anything so I took more."`,
        ], p));
    } else if (cat === 'tincture') {
        bullets.push(pickV([
            `Hold under the tongue for 60 seconds. Sublingual onset is 20–30 min — four times faster than if they just swallow it.`,
            `The difference between sublingual and swallowed is real: under the tongue hits in 20 min, swallowed takes 45–60. Tell them how to use it.`,
            `${brand || 'This brand'} tincture works best sublingual — under the tongue, 60 seconds, then swallow. Onset 20–30 minutes.`,
        ], p));
    } else if (cat === 'vape') {
        const isConc = thc > 50;
        bullets.push(isConc
            ? pickV([
                `${thc.toFixed(1)}% is concentrate-level, not flower-level. One short pull equals several bowls of flower. Warn first-timers.`,
                `This is a high-potency extract — ${thc.toFixed(1)}% THC. One pull, 5 minutes, done. Customers who are used to flower will be surprised by the intensity.`,
                `Vape cart at ${thc.toFixed(1)}% is roughly 3–4x stronger per pull than most flower. Small dose, wait, assess.`,
            ], p)
            : pickV([
                `One to two pulls, then wait 5 minutes before deciding if they want more. Vapes are fast — easy to overconsume if they rush it.`,
                `Pull, wait 5 minutes, assess. Most customers find 1–2 pulls of ${name} is a full dose.`,
                `Fast onset — 2–3 minutes. That's the upside and the risk. Tell them to pace it.`,
            ], p));
    } else if (cat === 'topical') {
        bullets.push(pickV([
            `No psychoactive effect — zero. Apply directly to the area, works in 15–20 minutes. Safe for daytime, safe for work.`,
            `Completely non-intoxicating. Goes right to the source. Good for customers who want relief without impairment.`,
            `${name} is topical-only — no systemic effect. Apply to the specific spot and let it absorb. Most people notice it in 15–20 min.`,
        ], p));
    } else if (cat === 'flower') {
        bullets.push(pickV([
            `Effects hit in 5–10 minutes. Start smaller than they think they need — they can always add, can't subtract.`,
            `Standard flower onset — 5–10 min. One or two hits, wait, decide. The best consumers are patient ones.`,
            `${brand || 'This'} flower hits fast. First-time customers especially: two hits and a 10-minute wait before going further.`,
        ], p));

// ── LLM TALKING POINTS — ASYNC UPGRADE ───────────────────────────────────────
// Builds the customer context object from current filter state + QR answers.
// QR answers are richer (6 questions) — always prefer them when available.
function buildCustomerContext() {
    const qa = window._qrCustomerAnswers || {};
    return {
        goal:       selectedGoal          || qa.goal       || 'relax',
        experience: qa.experience         || filters.experience || null,
        format:     qa.format             || filters.format     || null,
        intensity:  qa.intensity          || filters.intensity  || null,
        priceSpec:  qa.priceSpec          || filters.priceSpec  || null,
        ageRange:   qa.ageRange           || null,
        // Flag so Claude knows this came from a real customer interaction
        fromQR:     !!window._qrCustomerAnswers,
    };
}

// Simple hash for cache key — avoids re-fetching identical calls.
function _ctxHash(ctx) {
    return [ctx.experience, ctx.format, ctx.intensity, ctx.priceSpec, ctx.ageRange]
        .map(v => v || '_').join(':');
}

// Fetches LLM talking points for a product, then updates the already-rendered
// say-this drawer in the DOM. Falls back silently to template content on any error.
async function fetchAndUpgradeTalkingPoints(p, idx) {
    if (!TALKING_POINTS_API_URL) return; // no API configured — stay with templates
    const goal = selectedGoal;
    const ctx  = buildCustomerContext();
    const cacheKey = `${p.id}:${goal}:${_ctxHash(ctx)}`;

    // Check cache first
    if (_tpCache.has(cacheKey)) {
        _applyTalkingPoints(p.id, _tpCache.get(cacheKey));
        return;
    }

    const drawer = document.getElementById('say-' + p.id);
    if (!drawer) return;

    // Show subtle loading state while we wait
    drawer.classList.add('tp-loading');

    try {
        const res = await fetch(TALKING_POINTS_API_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ product: p, context: { ...ctx, goal } }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.opening || !Array.isArray(data.bullets) || !data.next_question) {
            throw new Error('unexpected shape');
        }

        _tpCache.set(cacheKey, data);
        _applyTalkingPoints(p.id, data);

    } catch (e) {
        // Silently swallow — template content stays visible
        console.warn('[cannascope] talking-points fallback for', p.name, e.message);
    } finally {
        if (drawer) drawer.classList.remove('tp-loading');
    }
}

// Patches the say-this drawer DOM in place with fresh LLM content.
function _applyTalkingPoints(productId, data) {
    const drawer = document.getElementById('say-' + productId);
    if (!drawer) return;

    const openingEl  = drawer.querySelector('.say-this-opening');
    const bulletsEl  = drawer.querySelector('.say-this-bullets');
    const nextEl     = drawer.querySelector('.say-this-next');
    const labelEl    = drawer.querySelector('.say-this-label');

    if (openingEl) openingEl.textContent = data.opening;

    if (bulletsEl) {
        bulletsEl.innerHTML = data.bullets
            .map(b => `<div class="say-this-bullet">${xe(b)}</div>`)
            .join('');
    }

    if (nextEl && data.next_question) {
        nextEl.textContent = `"Ask: ${data.next_question}"`;
    }

    // Add "Live AI" badge to the drawer label to signal upgraded content
    if (labelEl && !labelEl.querySelector('.tp-live-badge')) {
        labelEl.insertAdjacentHTML('beforeend', '<span class="tp-live-badge">Live AI</span>');
    }
}

// ── LIVE POTENCY SIGNAL ───────────────────────────────────────────────────────
function livePotencySignal(thc, cbd, category) {
    const t   = parseFloat(thc) || 0;
    const c   = parseFloat(cbd) || 0;
    const cat = (category || '').toLowerCase();
    if (cat === 'topical') return null;
    const ratio = t > 0 && c > 0 ? c / t : 0;
    if (ratio >= 2)  return { text: 'High CBD — reduces THC intensity. Beginner and THC-sensitive friendly.', cls: 'detail-potency-mild' };
    if (t >= 26)     return { text: t.toFixed(1) + '% THC — experienced consumers only. Flag before recommending.', cls: 'detail-potency-strong' };
    if (t >= 20)     return { text: t.toFixed(1) + '% THC — moderate to strong. Best for casual to experienced consumers.', cls: 'detail-potency-mod' };
    if (t >= 13)     return { text: t.toFixed(1) + '% THC — moderate. Accessible for most regular consumers.', cls: 'detail-potency-mod' };
    if (t > 0)       return { text: t.toFixed(1) + '% THC — mild. Great for beginners and low-tolerance customers.', cls: 'detail-potency-mild' };
    return null;
}
