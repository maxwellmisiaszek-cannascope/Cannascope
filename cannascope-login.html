        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #059669;
            --accent-light: #ECFDF5;
            --accent-border: #6EE7B7;
            --danger: #DC2626;
            --danger-light: #FEF2F2;
            --danger-border: #FECACA;
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --border: #E5E7EB;

            --text: #111827;
            --text-2: #6B7280;
            --text-3: #9CA3AF;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .page {
            min-height: 100vh;

            flex-direction: column;
            align-items: center;

            padding: 32px 20px;
        }

        .back-link {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-3);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 32px;
            transition: color 0.12s;
        }
        .back-link:hover { color: var(--text-2); }

        .wordmark {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
            display: block;
            margin-bottom: 32px;
        }
        .wordmark-accent { color: var(--accent); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 380px;
        }

        .card-heading {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 4px;
        }
        .card-sub {
            font-size: 13px;
            color: var(--text-2);
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 10px 13px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.08);
        }
        .form-input::placeholder { color: var(--text-3); }

        .msg {
            padding: 10px 13px;
            border-radius: 7px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            line-height: 1.5;
        }
        .msg-err {
            background: var(--danger-light);
            border: 1px solid var(--danger-border);
            color: var(--danger);
        }
        .msg-ok {
            background: var(--accent-light);
            border: 1px solid var(--accent-border);
            color: var(--accent);
        }

        .btn-submit {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            border: none;
            border-radius: 7px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.12s;
            margin-top: 4px;
        }
        .btn-submit:hover { background: #047857; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        .page-footer {
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-3);
            text-align: center;
        }
    </style>
</head>
<body>
<div class="page">

                       placeholder="Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢Ã¢ÂÂ¢" autocomplete="current-password">
            </div>

</div>

<script>
const SUPABASE_URL = 'https://nrcvpwyvxmplwvjrdoua.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yY3Zwd3l2eG1wbHd2anJkb3VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzg1MTQsImV4cCI6MjA4ODc1NDUxNH0.mWbihyevgsi8OF1iLHvhs8Wene-Gb7HNfEKxtDHwqls';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);


function showErr(msg) {
    const el = document.getElementById('msgErr');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('msgOk').style.display = 'none';
}
function showOk(msg) {
    const el = document.getElementById('msgOk');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('msgErr').style.display = 'none';
}

async function signIn() {
    const email = document.getElementById('siEmail').value.trim();
    const pass  = document.getElementById('siPass').value;
    if (!email || !pass) { showErr('Please enter your email and password.'); return; }
    const btn = document.getElementById('btnSignin');
    btn.disabled = true;
    btn.textContent = 'Signing inÃ¢ÂÂ¦';
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
        showErr(error.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
    }
    window.location.href = 'cannascope-admin.html';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
</script>
