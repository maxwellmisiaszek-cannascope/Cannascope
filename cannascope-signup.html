<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cannascope — Create Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #2D6A4F;
            --accent-mid: #40916C;
            --accent-light: #EAF4EE;
            --accent-border: #A8D5B8;
            --danger: #DC2626;
            --danger-light: #FEF2F2;
            --danger-border: #FECACA;
            --bg: #F8F6F1;
            --surface: #FFFFFF;
            --border: #E4DFCF;
            --border-2: #CEC8B4;
            --text: #1C1C16;
            --text-2: #5A5A48;
            --text-3: #9A9A82;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        .back-link {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-3);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 32px;
            transition: color 0.12s;
        }
        .back-link:hover { color: var(--text-2); }

        .wordmark {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            text-decoration: none;
            display: block;
            margin-bottom: 32px;
        }
        .wordmark-accent { color: var(--accent); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
        }

        .card-heading {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 4px;
        }
        .card-sub {
            font-size: 13px;
            color: var(--text-2);
            margin-bottom: 28px;
        }

        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 10px 13px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.08);
        }
        .form-input::placeholder { color: var(--text-3); }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        .msg {
            padding: 10px 13px;
            border-radius: 7px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            line-height: 1.5;
        }
        .msg-err {
            background: var(--danger-light);
            border: 1px solid var(--danger-border);
            color: var(--danger);
        }
        .msg-ok {
            background: var(--accent-light);
            border: 1px solid var(--accent-border);
            color: var(--accent);
        }

        .btn-submit {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            border: none;
            border-radius: 7px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.12s;
            margin-top: 4px;
        }
        .btn-submit:hover { background: var(--accent-mid); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        .page-footer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-3);
            text-align: center;
        }
        .page-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .page-footer a:hover { text-decoration: underline; }

        /* Success state */
        .success-view {
            display: none;
            text-align: center;
        }
        .success-icon {
            width: 52px;
            height: 52px;
            background: var(--accent-light);
            border: 1px solid var(--accent-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 22px;
            color: var(--accent);
        }
        .success-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .success-sub {
            font-size: 13px;
            color: var(--text-2);
            margin-bottom: 24px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div class="page">
    <a href="cannascope-landing.html" class="back-link">← Back to home</a>
    <a href="cannascope-landing.html" class="wordmark">Canna<span class="wordmark-accent">scope</span></a>

    <div class="card">

        <!-- Form view -->
        <div id="formView">
            <div class="card-heading">Create your account</div>
            <div class="card-sub">Get your dispensary set up in under a minute</div>

            <div id="msgErr" class="msg msg-err"></div>
            <div id="msgOk"  class="msg msg-ok"></div>

            <div class="form-group">
                <label class="form-label" for="dispName">Dispensary Name</label>
                <input class="form-input" id="dispName" type="text"
                       placeholder="e.g. Green Leaf Dispensary" autocomplete="organization">
            </div>

            <div class="divider"></div>

            <div class="form-group">
                <label class="form-label" for="email">Work Email</label>
                <input class="form-input" id="email" type="email"
                       placeholder="you@dispensary.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" id="password" type="password"
                       placeholder="Min. 8 characters" autocomplete="new-password">
            </div>

            <button class="btn-submit" id="btnSignup" onclick="signUp()">Create Account →</button>
        </div>

        <!-- Success / email-confirm view -->
        <div class="success-view" id="successView">
            <div class="success-icon">✓</div>
            <div class="success-title">Account created!</div>
            <div class="success-sub" id="successMsg">
                Your dispensary is ready. Taking you to your dashboard…
            </div>
            <a href="cannascope-admin.html" class="btn-submit"
               style="display:block;text-align:center;text-decoration:none;padding:11px;">
                Go to Dashboard →
            </a>
        </div>

    </div>

    <div class="page-footer">
        Already have an account? <a href="cannascope-login.html">Sign in →</a>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://nrcvpwyvxmplwvjrdoua.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yY3Zwd3l2eG1wbHd2anJkb3VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzg1MTQsImV4cCI6MjA4ODc1NDUxNH0.mWbihyevgsi8OF1iLHvhs8Wene-Gb7HNfEKxtDHwqls';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

function showErr(msg) {
    const el = document.getElementById('msgErr');
    el.innerHTML = msg;
    el.style.display = 'block';
    document.getElementById('msgOk').style.display = 'none';
}
function showOk(msg) {
    const el = document.getElementById('msgOk');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('msgErr').style.display = 'none';
}

async function signUp() {
    const dispName = document.getElementById('dispName').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!dispName) { showErr('Please enter your dispensary name.'); return; }
    if (!email)    { showErr('Please enter your work email.'); return; }
    if (password.length < 8) { showErr('Password must be at least 8 characters.'); return; }

    const btn = document.getElementById('btnSignup');
    btn.disabled = true;
    btn.textContent = 'Creating account…';

    // 1. Create Supabase auth user
    const { data: authData, error: authErr } = await sb.auth.signUp({ email, password });
    if (authErr) {
        const msg = authErr.message || '';
        if (msg.toLowerCase().includes('already registered') || msg.toLowerCase().includes('already been registered')) {
            showErr('An account with this email already exists. <a href="/login" style="color:inherit;font-weight:700;text-decoration:underline;">Sign in instead →</a>');
        } else if (msg.toLowerCase().includes('invalid email')) {
            showErr('Please enter a valid email address.');
        } else {
            showErr(msg);
        }
        btn.disabled = false;
        btn.textContent = 'Create Account →';
        return;
    }

    const userId = authData.user?.id;
    const session = authData.session;

    // 2a. If email confirmation is ON — no session yet, just show success message
    if (!session) {
        document.getElementById('formView').style.display = 'none';
        document.getElementById('successView').style.display = 'block';
        document.getElementById('successMsg').innerHTML =
            `Check your inbox at <strong>${email}</strong> to confirm your account, then sign in.<br><br>` +
            `Your dispensary name <strong>${dispName}</strong> will be set up once you confirm.`;
        // Store dispName so we can create the org on first login
        localStorage.setItem('cs_pending_org_name', dispName);
        return;
    }

    // 2b. Email confirmation OFF — session is live, create org now
    btn.textContent = 'Setting up dispensary…';
    await createOrgAndProfile(userId, dispName, session);
}

async function createOrgAndProfile(userId, dispName, session) {
    const btn = document.getElementById('btnSignup');

    // Ensure the client is using the authenticated session
    if (session?.access_token) {
        await sb.auth.setSession({ access_token: session.access_token, refresh_token: session.refresh_token });
    }

    // 3 & 4. Create org + profile via SECURITY DEFINER function (bypasses RLS)
    const { data: org, error: orgErr } = await sb
        .rpc('create_org_and_profile', { p_name: dispName });

    if (orgErr) {
        showErr('Account created but org setup failed: ' + orgErr.message +
            '. Please try again or contact hello@cannascope.us.');
        btn.disabled = false;
        btn.textContent = 'Create Account →';
        return;
    }

    // 5. Success — redirect to admin
    document.getElementById('formView').style.display = 'none';
    document.getElementById('successView').style.display = 'block';
    document.getElementById('successMsg').textContent =
        'Your dispensary is ready. Taking you to your dashboard…';
    setTimeout(() => { window.location.href = '/admin'; }, 1800);
}

// If user lands here after confirming email with a pending org name
(async () => {
    const { data: { session } } = await sb.auth.getSession();
    const pendingName = localStorage.getItem('cs_pending_org_name');
    if (session && pendingName) {
        localStorage.removeItem('cs_pending_org_name');
        // Check if they already have an org
        const { data: prof } = await sb.from('user_profiles')
            .select('organization_id').eq('id', session.user.id).single();
        if (!prof?.organization_id) {
            await createOrgAndProfile(session.user.id, pendingName, session);
        } else {
            window.location.href = '/admin';
        }
    }
})();

document.addEventListener('keydown', e => { if (e.key === 'Enter') signUp(); });
</script>
</body>
</html>
